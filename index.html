  "Apply":     { color: T.terra, bg:"rgba(196,122,82,0.08)",  border:"rgba(196,122,82,0.22)",  long:"Applying information in relation to living contexts and the way life collaborates with itself." },

// ── sections (12 screens) ─────────────────────────────────────────────────
const sections = [
  { id:"welcome" },
  { id:"question" },
  { id:"perceive" },
  { id:"relate" },
  { id:"apply" },
  { id:"data-chart" },
  { id:"data-human" },

// ── shared helpers ─────────────────────────────────────────────────────────
function E(tag, props, ...children) { return h(tag, props, ...children); }

function Screen({ children, centered=true }) {
  return E("div", { style:{
    minHeight:"100%", display:"flex", flexDirection:"column",
    justifyContent: centered ? "center" : "flex-start",
    padding: centered ? "60px 32px" : "72px 32px 28px",
    maxWidth:620, margin:"0 auto",
  }}, children);
}

function Label({ children, color=T.ghost }) {
  return E("div", { style:{
    fontSize:11, letterSpacing:"0.32em", textTransform:"uppercase",
    color, marginBottom:16, fontFamily:T.mono,
  }}, children);
}

function HeadLine({ children, color=T.cream, size="clamp(24px,5vw,40px)" }) {
  return E("h2", { style:{
    fontSize:size, fontWeight:300, color, fontFamily:T.serif,
    lineHeight:1.28, margin:"0 0 24px",
  }}, children);
}

function Body({ children, style={} }) {
  return E("p", { style:{
    fontSize:"clamp(16px,2.6vw,19px)", color:T.mist,
    fontFamily:T.serif, lineHeight:1.72, ...style,
  }}, children);
}

function ScoreBar({ label, value, color }) {
  return E("div", { style:{ marginBottom:10 } },
    E("div", { style:{ display:"flex", justifyContent:"space-between", marginBottom:5 } },
      E("span", { style:{ fontSize:14, color:T.mist, fontFamily:T.serif }}, label),
      E("span", { style:{ fontSize:13, color, fontFamily:T.mono, fontWeight:500 }}, value.toFixed(2))
    ),
    E("div", { style:{ height:5, background:"rgba(255,255,255,0.06)", borderRadius:3, overflow:"hidden" } },
      E("div", { style:{ height:"100%", width:(value*100)+"%", background:color, borderRadius:3, transition:"width 0.8s cubic-bezier(0.4,0,0.2,1)" }})
    )
  );
}

function NavDot({ active, onClick }) {
  return E("button", { onClick, style:{
    width: active ? 24 : 7, height:7, borderRadius:4, border:"none",
    background: active ? T.teal : "rgba(255,255,255,0.18)",
    cursor:"pointer", transition:"all 0.35s ease", padding:0,
  }});
}

// ── screen components ──────────────────────────────────────────────────────

    E("h1", { style:{
      fontSize:"clamp(26px,5.5vw,44px)", fontWeight:300, textAlign:"center",
      lineHeight:1.28, margin:"0 0 28px", color:T.cream, fontFamily:T.serif,
    }},
      "What if the species you know are already", E("br"),
      E("em", { style:{ color:T.teal, fontWeight:400 }}, "helping us see a field of intelligence at work?")

    E("p", { style:{
      fontSize:"clamp(16px,2.4vw,19px)", color:T.mist, textAlign:"center",

      fontSize:"clamp(15px,2.2vw,17px)", color:T.mist, textAlign:"center",

    },

      onMouseLeave:e=>e.target.style.background="transparent",
    }, "Begin →"),
    E("div", { style:{ marginTop:56, fontSize:11, color:"rgba(255,255,255,0.18)", fontFamily:T.mono, textAlign:"center", lineHeight:1.7 }},
      "Kerri Lake · Generation of Harmony", E("br"), "Intuitive Learning Foundation"
    )

function QuestionScreen() {
  const [step, setStep] = useState(0);
  useEffect(()=>{
    const t1=setTimeout(()=>setStep(1),400);
    const t2=setTimeout(()=>setStep(2),1500);
    const t3=setTimeout(()=>setStep(3),2600);
    return ()=>{ clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  },[]);
  const lines = [
    { text:"You already know this:", color:T.ghost, size:"clamp(17px,2.8vw,21px)", weight:300 },
    { text:"The species you study, protect, and care for are intelligent in ways that standard frameworks can't recognize.", color:T.cream, size:"clamp(20px,3.8vw,30px)", weight:300 },
    { text:"What if there were a framework that could?", color:T.teal, size:"clamp(21px,4.2vw,32px)", weight:400, italic:true },
  ];
  return E(Screen, null,
    lines.map((l,i)=>E("p", { key:i, style:{
      fontSize:l.size, fontWeight:l.weight, color:l.color,
      fontFamily:T.serif, lineHeight:1.5, fontStyle:l.italic?"italic":"normal",
      opacity:step>i?1:0, transform:step>i?"none":"translateY(16px)",
      transition:"all 0.85s cubic-bezier(0.4,0,0.2,1)",
      marginBottom: i===0?14 : i===1?40 : 0,
    }}, l.text))
  );
}

function DimensionScreen({ letter, label, color, tagline, description, examples }) {
  return E(Screen, null,
    E(Label, { color }, "The Framework · " + label),
    E("div", { style:{
      fontSize:"clamp(52px,12vw,88px)", fontWeight:200, color, fontFamily:T.serif,
      lineHeight:1, margin:"0 0 8px",
    }}, letter),
    E("h2", { style:{ fontSize:"clamp(22px,4vw,32px)", fontWeight:400, color:T.cream, fontFamily:T.serif, margin:"0 0 20px" }}, label),
    E("p", { style:{ fontSize:"clamp(15px,2.4vw,18px)", color, fontFamily:T.serif, lineHeight:1.6, fontStyle:"italic", margin:"0 0 20px" }}, tagline),
    E(Body, { style:{ margin:"0 0 28px" }}, description),
    E("div", { style:{ borderTop:"1px solid rgba(255,255,255,0.07)", paddingTop:20 }},
      E("div", { style:{ fontSize:12, letterSpacing:"0.2em", textTransform:"uppercase", color:T.ghost, fontFamily:T.mono, marginBottom:12 }}, "Examples"),
      E("div", { style:{ display:"flex", flexWrap:"wrap", gap:8 }},
        examples.map(ex=>E("span", { key:ex, style:{
          fontSize:14, color:T.mist, padding:"5px 14px",
          background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.07)",
          borderRadius:20, fontFamily:T.serif,
        }}, ex))
      )
    )
  );
}

function DataChartScreen() {
  const [revealed, setRevealed] = useState(false);
  useEffect(()=>{ setTimeout(()=>setRevealed(true),500); },[]);
  const bars = [
    { label:"Relate To", pct:58, color:T.teal },
    { label:"Perceive",  pct:15, color:T.gold },
    { label:"Apply",     pct:12, color:T.terra },
    { label:"Balanced",  pct:15, color:"#888" },
  ];
  return E(Screen, null,
    E(Label, null, "260+ Species · Every Kingdom of Life"),
    E(HeadLine, null,
      "When you map intelligence across species, ",
      E("em", { style:{ color:T.teal }}, "meaning-making leads")
    ),
    E("div", { style:{ display:"flex", flexDirection:"column", gap:14, marginBottom:32 }},
      bars.map(b=>E("div", { key:b.label },
        E("div", { style:{ display:"flex", justifyContent:"space-between", marginBottom:6 }},
          E("span", { style:{ fontSize:16, color:T.mist, fontFamily:T.serif }}, b.label),
          E("span", { style:{ fontSize:15, color:b.color, fontFamily:T.mono, fontWeight:500 }}, b.pct+"%")

        E("div", { style:{ height:10, background:"rgba(255,255,255,0.05)", borderRadius:5, overflow:"hidden" }},
          E("div", { style:{
            height:"100%", borderRadius:5, background:b.color,

            transition:"width 1.2s cubic-bezier(0.4,0,0.2,1) "+(bars.indexOf(b)*0.2)+"s",
          }})
        )
      ))
    ),
    E(Body, null, "From bacteria to whales, fungi to forests — across every kingdom we've profiled, the pattern holds. The majority of species organize their existence primarily through how they internally ", E("em", null, "relate to"), " what they perceive.")
  );
}

function DataHumanScreen() {
  return E(Screen, null,
    E(Label, null, "A Notable Finding"),
    E(HeadLine, { color:T.terra }, "Humans are Apply-primary."),
    E(Body, { style:{ margin:"0 0 28px" }},
      "We are one of the few species whose existence is organized primarily around action — compulsively oriented toward changing the external world, regardless of the depth of perception or meaning-making that precedes it."
    ),
    E("div", { style:{ background:"rgba(196,122,82,0.07)", border:"1px solid rgba(196,122,82,0.2)", borderRadius:16, padding:"24px 28px" }},
      E("p", { style:{ fontSize:"clamp(16px,2.5vw,19px)", color:T.terra, fontFamily:T.serif, lineHeight:1.7, fontStyle:"italic" }},
        "The invitation in this framework isn't a critique of human intelligence. It's a reminder that we have the capacity to expand what we perceive and deepen the meaning we make — before we act."
      )
    )
  );
}

function ExplorerScreen() {
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [showScores, setShowScores] = useState(null);

  const filtered = speciesData.filter(s=>{
    if (s.name==="Earth") return false;
    const matchCat = filter==="all" || s.category===filter;
    const q = search.toLowerCase();
    const matchSearch = s.name.toLowerCase().includes(q) || s.group.toLowerCase().includes(q) || s.kingdom.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  const counts = {
    all: speciesData.filter(s=>s.name!=="Earth").length,
    "Relate To": speciesData.filter(s=>s.category==="Relate To").length,
    "Perceive": speciesData.filter(s=>s.category==="Perceive").length,
    "Apply": speciesData.filter(s=>s.category==="Apply").length,
  };

  return E("div", { style:{ minHeight:"100%", display:"flex", flexDirection:"column", padding:"72px 28px 20px", maxWidth:640, margin:"0 auto" }},
    E(Label, null, "Species Explorer"),
    E("h2", { style:{ fontSize:"clamp(20px,3.5vw,28px)", fontWeight:300, color:T.cream, margin:"0 0 18px", fontFamily:T.serif }}, "Meet the intelligence around you"),
    E("input", { type:"text", placeholder:"Search by species, group, or kingdom...", value:search, onChange:e=>setSearch(e.target.value), style:{
      background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.09)",
      borderRadius:10, padding:"11px 18px", color:T.cream, fontSize:15,
      fontFamily:T.serif, outline:"none", marginBottom:12, width:"100%", boxSizing:"border-box",
    }}),
    E("div", { style:{ display:"flex", gap:7, marginBottom:16, flexWrap:"wrap" }},
      ["all","Relate To","Perceive","Apply"].map(f=>{
        const isActive = filter===f;
        const color = f==="all" ? "#888" : categoryMeta[f].color;
        return E("button", { key:f, onClick:()=>setFilter(f), style:{
          background: isActive ? color+"18" : "rgba(255,255,255,0.02)",
          border:"1px solid "+(isActive ? color+"45" : "rgba(255,255,255,0.07)"),
          borderRadius:20, padding:"6px 14px", cursor:"pointer",
          color: isActive ? color : T.ghost, fontSize:14, fontFamily:T.serif, transition:"all 0.2s ease",
        }}, (f==="all"?"All":f)+" ("+counts[f]+")");
      })
    ),
    E("div", { style:{ flex:1, overflowY:"auto", display:"flex", flexDirection:"column", gap:6, paddingRight:4, minHeight:0 }},
      filtered.map(s=>{
        const meta = categoryMeta[s.category];
        const isSel = selected===s.name;
        return E("button", { key:s.name, onClick:()=>setSelected(isSel?null:s.name), style:{
          background: isSel ? meta.bg : "rgba(255,255,255,0.015)",
          border:"1px solid "+(isSel ? meta.border : "rgba(255,255,255,0.05)"),
          borderRadius:12, padding: isSel ? "16px 18px" : "12px 18px",
          cursor:"pointer", textAlign:"left", transition:"all 0.3s ease", flexShrink:0,
        }},
          E("div", { style:{ display:"flex", alignItems:"center", gap:12 }},
            E("span", { style:{ fontSize:22, width:30, textAlign:"center" }}, s.icon),
            E("div", { style:{ flex:1, minWidth:0 }},
              E("div", { style:{ fontSize:16, fontWeight:500, color:T.cream, fontFamily:T.serif }}, s.name),
              E("div", { style:{ fontSize:12, color:T.ghost, fontFamily:T.mono, marginTop:2 }}, s.kingdom+" · "+s.group)
            ),
            E("span", { style:{
              fontSize:11, color:meta.color, padding:"3px 10px",
              background:meta.color+"12", borderRadius:8, fontFamily:T.mono, whiteSpace:"nowrap",
            }}, s.category)
          ),
          isSel ? E("div", { style:{ margin:"14px 0 0 42px" }},
            E("p", { style:{ fontSize:15, color:meta.color, margin:"0 0 10px", fontFamily:T.serif, fontStyle:"italic", lineHeight:1.5 }}, s.tagline),
            E("p", { style:{ fontSize:15, color:T.mist, lineHeight:1.72, margin:"0 0 14px", fontFamily:T.serif }}, s.narrative),
            E("button", { onClick:e=>{ e.stopPropagation(); setShowScores(showScores===s.name?null:s.name); }, style:{
              background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)",
              borderRadius:8, padding:"8px 14px", cursor:"pointer", color:T.ghost,
              fontSize:12, fontFamily:T.mono, marginBottom:showScores===s.name?12:0,
              transition:"all 0.2s ease", width:"100%", textAlign:"left",
            }}, showScores===s.name ? "▾ Hide scores" : "▸ View P / R / A scores"),
            showScores===s.name ? E("div", { style:{ marginTop:8 }},
              E(ScoreBar, { label:"Perceive", value:s.p, color:T.gold }),
              E(ScoreBar, { label:"Relate To", value:s.r, color:T.teal }),
              E(ScoreBar, { label:"Apply", value:s.a, color:T.terra }),
            ) : null
          ) : null
        );
      }),
      filtered.length===0 ? E("p", { style:{ color:T.ghost, textAlign:"center", padding:40, fontFamily:T.serif, fontStyle:"italic" }}, "No species found.") : null
    ),
    E("div", { style:{ marginTop:12, padding:"10px 14px", background:"rgba(255,255,255,0.02)", borderRadius:8 }},
      E("p", { style:{ fontSize:12, color:T.ghost, margin:0, fontFamily:T.mono, textAlign:"center" }},
        "Showing "+filtered.length+" featured profiles · Full dataset: 260+ species across every kingdom")
    )
  );
}

function RecognitionAScreen() {
  const [step, setStep] = useState(0);
  useEffect(()=>{
    const t1=setTimeout(()=>setStep(1),400);
    const t2=setTimeout(()=>setStep(2),1600);
    return ()=>{ clearTimeout(t1); clearTimeout(t2); };
  },[]);
  return E(Screen, null,
    E(Label, null, "Recognition"),
    E("div", { style:{ opacity:step>=1?1:0, transform:step>=1?"none":"translateY(14px)", transition:"all 0.85s ease", marginBottom:28 }},
      E(Body, null,
        "An elephant and a mycelial network arrive at the same depth of meaning-making through entirely different biological expressions."
      )
    ),
    E("div", { style:{ opacity:step>=2?1:0, transform:step>=2?"none":"translateY(14px)", transition:"all 0.85s ease" }},
      E(Body, null,
        "A wolf pack and a dolphin pod arrive at nearly identical intelligence configurations — one on land, one in the ocean, through entirely different biology. A bear in solitary walking meditation experiences the same depth of relationship as a hyena navigating complex political alliances."
      )
    )
  );
}

function RecognitionBScreen() {
  return E(Screen, null,
    E(Label, { color:T.teal }, "What This Means"),
    E("div", { style:{ background:"rgba(61,97,120,0.06)", border:"1px solid rgba(61,97,120,0.18)", borderRadius:16, padding:"28px 28px", marginBottom:28 }},
      E("p", { style:{ fontSize:"clamp(17px,2.8vw,22px)", color:T.teal, fontFamily:T.serif, lineHeight:1.65, fontStyle:"italic" }},
        "The framework doesn't try to correct what you know about the species you love. It illuminates connections you may have felt but not had language for."
      )
    ),
    E(Body, null,
      "A coral reef biologist already knows that without communication across species boundaries, there is no reef — just scattered organisms. The reef's intelligence IS integration itself. This framework opens doors for that kind of recognition, with invitations for deeper curiosity."
    )
  );
}

function VisionScreen() {
  const [expanded, setExpanded] = useState(null);
  const points = [
    { title:"A shared language across disciplines",
      desc:"Marine biologists, forest ecologists, animal behaviorists, and conservation educators all observe intelligence that current frameworks can't hold. P/R/A provides a common vocabulary that preserves each species' specificity while revealing patterns that connect them." },
    { title:"Education that sees species on their own terms",
      desc:"Instead of ranking species on a ladder from 'simple' to 'complex,' the framework illuminates each species within its own intelligence configuration. A jellyfish isn't less intelligent than a dolphin — it's organized around perception rather than meaning-making." },
    { title:"Conservation informed by intelligence patterns",
      desc:"When 58% of species organize their existence around meaning-making, conservation strategy shifts. Protecting habitat isn't just preserving resources — it's preserving the conditions that allow meaning-making to continue." },
    { title:"A different foundation for AI",
      desc:"Current AI can process information and generate outputs, but has no genuine internal relationship to what it processes. The pattern the data reveals — that meaning-making, not computation, organizes most life — points toward a fundamentally different approach to building AI." },
  ];
  return E(Screen, { centered:false },
    E(Label, { color:T.teal }, "What This Makes Possible"),
    E(HeadLine, null, "A framework that grows with your work"),
    E("div", { style:{ display:"flex", flexDirection:"column", gap:8 }},
      points.map((p,i)=>{
        const isOpen = expanded===i;
        return E("button", { key:i, onClick:()=>setExpanded(isOpen?null:i), style:{
          background: isOpen?"rgba(61,97,120,0.06)":"rgba(255,255,255,0.015)",
          border:"1px solid "+(isOpen?"rgba(61,97,120,0.18)":"rgba(255,255,255,0.05)"),
          borderRadius:12, padding:"16px 20px", cursor:"pointer", textAlign:"left", transition:"all 0.3s ease",
        }},
          E("div", { style:{ display:"flex", alignItems:"center", gap:14 }},
            E("span", { style:{ fontSize:20, color:T.teal, fontFamily:T.serif, width:26, fontWeight:300 }}, i+1),
            E("span", { style:{ fontSize:16, fontWeight:500, color:T.cream, fontFamily:T.serif }}, p.title)
          ),
          isOpen ? E("p", { style:{ fontSize:15, color:T.mist, lineHeight:1.7, margin:"14px 0 0 40px", fontFamily:T.serif }}, p.desc) : null
        );
      })
    )
  );
}

function CloseScreen() {
  return E(Screen, null,
    E(Label, { color:T.teal }, "Explore Further"),
    E(HeadLine, null, "The intelligence is already there."),
    E(Body, { style:{ margin:"0 0 36px" }},
      "Every species you work with carries a P/R/A signature. PRAcel lets you have a conversation with an AI built from this framework — one that recognizes intelligence the way you already do."
    ),
    E("div", { style:{ display:"flex", flexDirection:"column", gap:10, marginBottom:36 }},
      [
        { label:"Explore the live AI", url:"pracel.live/entry", color:T.teal },
        { label:"Read more on Substack", url:"substack.com/@kerrilake", color:T.gold },
      ].map(l=>E("a", { key:l.url, href:"https://"+l.url, target:"_blank", style:{
        display:"block", padding:"14px 20px",
        background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.07)",
        borderRadius:12, textDecoration:"none", transition:"all 0.2s ease",
        fontFamily:T.serif, fontSize:16, color:l.color,
      }},
        l.label+" → ", E("span", { style:{ fontSize:13, color:T.mist, fontFamily:T.mono }}, l.url)
      ))
    ),
    E("div", { style:{ fontSize:12, color:T.ghost, fontFamily:T.mono, lineHeight:1.8 }},
      "Unspeciated\u2122 \u00B7 generateharmony.com"
    )
  );
}

// ── main app ───────────────────────────────────────────────────────────────
function PRAGuide() {
  const [current, setCurrent] = useState(0);
  const goTo = idx => setCurrent(Math.max(0, Math.min(idx, sections.length-1)));

  const screens = [
    E(WelcomeScreen,     { key:"welcome",       onNext:()=>goTo(1) }),
    E(QuestionScreen,    { key:"question" }),
    E(DimensionScreen,   { key:"perceive",      letter:"P", label:"Perceive",   color:T.gold,
      tagline:"The capacity to take in information — through every channel available.",
      description:"Every species perceives through a different combination of channels, at different depths. Perceive covers both linear information — light, sound, pressure, chemistry — and nonlinear information: felt sense, bioelectric fields, quantum coherence, the kind of knowing that arrives before explanation. How many channels a species receives through, and how deep the reception within those channels, shapes everything else.",
      examples:["Mantis Shrimp","Jellyfish","Grasshoppers","Horses","Earth"] }),
    E(DimensionScreen,   { key:"relate",        letter:"R", label:"Relate To",  color:T.teal,
      tagline:"The internal act of making meaning from what is perceived.",
      description:"This is not about relationships between species — it is about what happens inside an individual organism when information arrives. Where that information gains weight, significance, and orientation. Where a scent becomes a memory, a temperature becomes a warning, a pattern becomes understanding. This is the dimension most life on Earth appears to organize itself around.",
      examples:["Elephants","Coral Reefs","Mycelial Networks","Whales","Aspen Trees"] }),
    E(DimensionScreen,   { key:"apply",         letter:"A", label:"Apply",      color:T.terra,
      tagline:"Acting on information in relation to living contexts.",
      description:"Apply is not just doing — it is doing in relationship to the way life collaborates with itself. The breadth and depth of a species' behavioral repertoire. A frog metamorphosing between two body plans. A beaver reshaping a watershed. A coral reef synchronizing spawning across miles of ocean. And humans — compulsively transforming the external world, with the potential to act from deeper perception and meaning.",
      examples:["Frogs","Humans","Beavers","Bees","Wolves"] }),
    E(DataChartScreen,   { key:"data-chart" }),
    E(DataHumanScreen,   { key:"data-human" }),
    E(ExplorerScreen,    { key:"explorer" }),
    E(RecognitionAScreen,{ key:"recognition-a" }),
    E(RecognitionBScreen,{ key:"recognition-b" }),
    E(VisionScreen,      { key:"vision" }),
    E(CloseScreen,       { key:"close" }),
  ];

  const touchStart = useRef(null);
  const onTouchStart = e => { touchStart.current = e.touches[0].clientX; };
  const onTouchEnd = e => {
    if (touchStart.current===null) return;
    const diff = touchStart.current - e.changedTouches[0].clientX;
    if (Math.abs(diff)>55) {
      if (diff>0 && current<sections.length-1) goTo(current+1);
      if (diff<0 && current>0) goTo(current-1);
    }
    touchStart.current = null;
  };

  return E("div", { onTouchStart, onTouchEnd, style:{
    width:"100%", height:"100vh", background:T.ink, color:T.cream,
    display:"flex", flexDirection:"column", fontFamily:T.serif,
    overflow:"hidden", position:"relative",
  }},
    // subtle dot texture
    E("div", { style:{ position:"absolute", inset:0, opacity:0.013,
      backgroundImage:"radial-gradient(rgba(106,154,181,0.5) 1px, transparent 1px)",
      backgroundSize:"44px 44px", pointerEvents:"none" }}),
    // nav bar
    current>0 ? E("div", { style:{
      position:"absolute", top:0, left:0, right:0, zIndex:10,
      display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 20px",
    }},
      E("button", { onClick:()=>goTo(current-1), style:{
        background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)",
        borderRadius:8, padding:"6px 14px", color:T.ghost, fontSize:13,
        cursor:"pointer", fontFamily:T.serif,
      }}, "← Back"),
      E("div", { style:{ display:"flex", gap:5, alignItems:"center" }},
        sections.map((s,i)=>E(NavDot, { key:s.id, active:i===current, onClick:()=>goTo(i) }))
      ),
      current<sections.length-1
        ? E("button", { onClick:()=>goTo(current+1), style:{
            background:"rgba(61,97,120,0.09)", border:"1px solid rgba(61,97,120,0.28)",
            borderRadius:8, padding:"6px 14px", color:T.teal, fontSize:13,
            cursor:"pointer", fontFamily:T.serif,
          }}, "Next →")
        : E("div", { style:{ width:68 }})
    ) : null,
    // content
    E("div", { style:{ flex:1, overflow:"hidden" }},
      E("div", { key:current, style:{ height:"100%", overflow:"auto", animation:"fg_fadeIn 0.45s ease" }},
        screens[current]
      )
    )
  );
}

ReactDOM.render(E(PRAGuide), document.getElementById("root"));
  </script>
</body>
