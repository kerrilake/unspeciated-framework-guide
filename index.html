// ─── Main App ───
function PRAGuide() {
  var cr = useState(0), current = cr[0], setCurrent = cr[1];
  var goTo = function(idx) { setCurrent(Math.max(0, Math.min(idx, sections.length - 1))); };

  var comps = [
    E(WelcomeSection, { key: "w", onNext: function() { goTo(1); } }),
    E(QuestionSection, { key: "q" }),
    E(FrameworkSection, { key: "f" }),
    E(DataSection, { key: "d" }),
    E(ExplorerSection, { key: "e" }),
    E(RecognitionSection, { key: "r" }),
    E(VisionSection, { key: "v" }),
  ];

  // Swipe
  var touchStartRef = useRef(null);
  var handleTouchStart = function(e) { touchStartRef.current = e.touches[0].clientX; };
  var handleTouchEnd = function(e) {
    if (touchStartRef.current === null) return;
    var diff = touchStartRef.current - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 60) {
      if (diff > 0 && current < sections.length - 1) goTo(current + 1);
      if (diff < 0 && current > 0) goTo(current - 1);
    }
    touchStartRef.current = null;
  };

  return E("div", { onTouchStart: handleTouchStart, onTouchEnd: handleTouchEnd, style: {
    width: "100%", height: "100vh", background: "#2a2725", color: "#f0ebe3", display: "flex", flexDirection: "column",
    fontFamily: "'Newsreader', serif", overflow: "hidden", position: "relative" } },
    // Texture
    E("div", { style: { position: "absolute", inset: 0, opacity: 0.015, backgroundImage: "radial-gradient(rgba(61,97,120,0.4) 1px, transparent 1px)", backgroundSize: "40px 40px", pointerEvents: "none" } }),
    // Nav
    current > 0 ? E("div", { style: { position: "absolute", top: 0, left: 0, right: 0, zIndex: 10, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 18px" } },
      E("button", { onClick: function() { goTo(current - 1); }, style: { background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, padding: "5px 12px", color: "rgba(255,255,255,0.5)", fontSize: 12, cursor: "pointer", fontFamily: "'Newsreader', serif" } }, "\u2190 Back"),
      E("div", { style: { display: "flex", gap: 5, alignItems: "center" } },
        sections.map(function(s, i) { return E(NavDot, { key: s.id, active: i === current, label: s.label, onClick: function() { goTo(i); } }); })
      ),
      current < sections.length - 1 ?
        E("button", { onClick: function() { goTo(current + 1); }, style: { background: "rgba(61,97,120,0.08)", border: "1px solid rgba(61,97,120,0.25)", borderRadius: 8, padding: "5px 12px", color: "#6a9ab5", fontSize: 12, cursor: "pointer", fontFamily: "'Newsreader', serif" } }, "Next \u2192") :
        E("div", { style: { width: 60 } })
    ) : null,
    // Content
    E("div", { style: { flex: 1, overflow: "hidden" } },
      E("div", { key: current, style: { height: "100%", overflow: "auto", animation: "praguide_fadeIn 0.45s ease" } }, comps[current])
    )
  );
}

ReactDOM.render(E(PRAGuide), document.getElementById("root"));
